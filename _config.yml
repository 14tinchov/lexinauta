# lexinauta — Jekyll para GitHub Pages (español, UTF-8)
title: lexinauta
description: "Blog personal"
tagline: "Pensando en voz alta"
intro: "Notas, ideas y cosas que voy descubriendo"
encoding: utf-8
lang: es

# URL canónica del sitio (sin barra final).
# Proyecto en GitHub Pages: usuario + repo en baseurl.
url: "https://14tinchov.github.io"
baseurl: "/lexinauta"
#
# Cuando uses dominio propio en GitHub (sitio en la raíz del host), cambia a:
#   url: "https://www.lexinauta.com"
#   baseurl: ""
# Luego vuelve a desplegar; las plantillas con `relative_url` / `absolute_url` seguirán bien.

markdown: kramdown
kramdown:
  input: GFM
permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-paginate

paginate: 5
paginate_path: "/pagina/:num/"

# Comentarios: crea un sitio en https://disqus.com y pega aquí el "shortname"
disqus_shortname: ""

author:
  name: "Martin Villalba"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - ideas
