<section class="comments" id="comentarios">
  <h2 class="comments__title">Comentarios</h2>
  <div id="disqus_thread"></div>
  <script>
    var disqus_config = function () {
      this.page.url = "{{ site.url }}{{ site.baseurl }}{{ page.url }}";
      this.page.identifier = "{{ page.url }}";
    };
    (function() {
      var d = document, s = d.createElement('script');
      s.src = 'https://{{ site.disqus_shortname }}.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
  <noscript>Habilitá JavaScript para ver los <a href="https://disqus.com/?ref_noscript">comentarios con Disqus</a>.</noscript>
</section>
